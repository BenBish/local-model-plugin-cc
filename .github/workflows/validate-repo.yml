name: Validate Repo

on:
  pull_request:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: Validate plugin and config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate JSON and YAML
        run: |
          ruby <<'RUBY'
          require "json"
          require "yaml"

          files = `git ls-files`.lines.map(&:chomp)
          failed = false

          files.grep(/\.(json)$/).each do |path|
            begin
              JSON.parse(File.read(path))
              puts "json ok: #{path}"
            rescue => e
              warn "json invalid: #{path}: #{e.message}"
              failed = true
            end
          end

          files.grep(/\.(ya?ml)$/).each do |path|
            begin
              YAML.safe_load_file(path, permitted_classes: [Symbol], aliases: true)
              puts "yaml ok: #{path}"
            rescue => e
              warn "yaml invalid: #{path}: #{e.message}"
              failed = true
            end
          end

          exit(failed ? 1 : 0)
          RUBY

      - name: Prevent Claude command regression
        run: |
          if [ -d .claude/commands ]; then
            echo "::error::.claude/commands should not be reintroduced; plugin commands live under plugins/*/commands/"
            find .claude/commands -maxdepth 2 -type f
            exit 1
          fi

      - name: Validate plugin commands and agents
        run: |
          ruby <<'RUBY'
          require "yaml"

          def frontmatter(path)
            text = File.read(path)
            match = text.match(/\A---\s*\n(.*?)\n---\s*\n/m)
            return nil unless match
            YAML.safe_load(match[1]) || {}
          end

          failed = false

          Dir.glob("plugins/*/commands/*.md").sort.each do |path|
            data = frontmatter(path)
            if data.nil?
              warn "missing YAML frontmatter: #{path}"
              failed = true
              next
            end
            if data["description"].to_s.strip.empty?
              warn "missing description: #{path}"
              failed = true
            end
            puts "command ok: #{path}"
          end

          Dir.glob("plugins/*/agents/*.md").sort.each do |path|
            data = frontmatter(path)
            if data.nil?
              warn "missing YAML frontmatter: #{path}"
              failed = true
              next
            end
            %w[name description tools].each do |field|
              if data[field].to_s.strip.empty?
                warn "missing #{field}: #{path}"
                failed = true
              end
            end
            puts "agent ok: #{path}"
          end

          exit(failed ? 1 : 0)
          RUBY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
